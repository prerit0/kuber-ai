<!DOCTYPE html>
<html>
<head>
<title>Gold Investment AI</title>
<style>
body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:40px;
}
input,button{
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Gold Investment AI</h2>

<input id="msg" placeholder="Ask about gold investment" size="40"/>
<br>
<button onclick="chat()">Ask</button>

<p id="response"></p>

<button onclick="buy()">Buy Digital Gold</button>

<script>

async function chat(){

let message=document.getElementById("msg").value

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message})
})

let data=await res.json()

document.getElementById("response").innerText=data.response
}

async function buy(){

let res=await fetch("/buy-gold",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:"demo",
amount:500
})
})

let data=await res.json()

alert(data.message)
}

</script>

</body>
</html>
